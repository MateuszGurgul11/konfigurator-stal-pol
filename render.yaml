# Blueprint Render — backend FastAPI (katalog backend/)
# Dashboard: https://dashboard.render.com → New → Blueprint → repo konfigurator-stal-pol
services:
  - type: web
    name: konfigurator-stal-pol-api
    runtime: docker
    rootDir: backend
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: FIREBASE_PROJECT_ID
        value: konfigurator-stal-pol
      - key: PORT
        value: "8000"
      # Wklej w Render Dashboard (Environment) — wygeneruj: cd backend && ./scripts/print-render-env.sh
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      # URL frontendu na Vercel + localhost do testów
      - key: CORS_ORIGINS
        value: https://konfigurator-stal-pol.vercel.app,http://localhost:3000,http://localhost:3001
